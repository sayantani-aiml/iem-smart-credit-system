<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEM Smart Credit Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>🎓 IEM Credit Calculator</h2>

    <div class="container login-card" id="loginBox">
        <h3>Portal Login</h3>
        <div class="form-group">
            <label for="reg">Registration Number</label>
            <input type="text" id="reg" placeholder="Enter Registration No.">
        </div>
        <div class="captcha-wrapper">
            <span id="captchaText" class="captcha-badge"></span>
            <input type="text" id="captchaInput" placeholder="Enter Captcha Code">
        </div>
        <button class="btn-primary" onclick="login()">Access Calculator</button>
    </div>

    <div class="app-grid hidden" id="app">
        
        <div class="panel">
            <div class="panel-header">🎯 Input Parameters</div>
            
            <div class="section-title">Student Profile</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="roll">Roll No</label>
                    <input type="text" id="roll" placeholder="Your Roll">
                </div>
            </div>

            <div class="section-title">Online Certifications (MOOCs & IFC)</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="linkedin">LinkedIn Learning</label>
                    <input type="number" id="linkedin" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="coursera">Coursera</label>
                    <input type="number" id="coursera" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="udemy">Udemy</label>
                    <input type="number" id="udemy" min="0" placeholder="0">
                </div>
            </div>

            <div class="section-title">College & Extracurricular Activities</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="iem">IEM Learning Platforms</label>
                    <input type="number" id="iem" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="event">Technical Events</label>
                    <input type="number" id="event" min="0" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="volunteer">Volunteering / Social Work</label>
                    <input type="number" id="volunteer" min="0" placeholder="0">
                </div>
            </div>

            <div class="section-title">NPTEL Certification Track</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="weeks">Course Timeline</label>
                    <select id="weeks">
                        <option value="4">4 Weeks Course</option>
                        <option value="8">8 Weeks Course</option>
                        <option value="12">12 Weeks Course</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="passed">Exam Status</label>
                    <select id="passed">
                        <option value="yes">Passed / Certified</option>
                        <option value="no">Not Passed</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary calculate-btn" onclick="calculate()">Compute Evaluation Matrix</button>
        </div>

        <div class="panel results-panel">
            <div class="panel-header">📊 Evaluation Dashboard</div>
            <div id="output" class="empty-output-state">
                Please enter your credentials/data metrics and click calculate to view your academic standing.
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
